<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/ml-logo.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1976d2" />
    <meta name="description" content="MARKETLINK EXPRESS - 缅甸专业快递服务，提供国内快递、国际快递、同城快递等服务。快速、安全、可靠的快递解决方案。" />
    <meta name="keywords" content="缅甸快递,快递服务,国际快递,国内快递,同城快递,铁路运输,包裹追踪,价格咨询" />
    <meta name="author" content="MARKETLINK EXPRESS" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ml-express.com/" />
    <meta property="og:title" content="MARKETLINK EXPRESS - 缅甸专业快递服务" />
    <meta property="og:description" content="提供国内快递、国际快递、同城快递、铁路运输等服务。快速、安全、可靠的快递解决方案。" />
    <meta property="og:image" content="%PUBLIC_URL%/ml-og.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://ml-express.com/" />
    <meta property="twitter:title" content="MARKETLINK EXPRESS - 缅甸专业快递服务" />
    <meta property="twitter:description" content="提供国内快递、国际快递、同城快递、铁路运输等服务。快速、安全、可靠的快递解决方案。" />
    <meta property="twitter:image" content="%PUBLIC_URL%/ml-og.jpg" />
    
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/ml-logo-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- 使用本地字体（@fontsource）替代 Google Fonts，CSP 更严格 -->
    <!-- 移除内联脚本以满足严格 CSP -->
    <title>MARKETLINK EXPRESS - 缅甸专业快递服务 | 快速、安全、可靠</title>
  </head>
  <body>
    <noscript>您需要启用 JavaScript 才能运行此应用程序。</noscript>
    <div id="root"></div>

    <!-- Netlify Forms: 隐形表单用于让 Netlify 识别表单结构并启用表单收集/邮件通知 -->
    <form name="pricing-inquiry" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="pricing-inquiry" />
      <input type="text" name="serviceType" />
      <input type="text" name="fromLocation" />
      <input type="text" name="toLocation" />
      <input type="text" name="packageType" />
      <input type="text" name="weight" />
      <input type="text" name="dimensions" />
      <input type="text" name="customerName" />
      <input type="text" name="phone" />
      <input type="email" name="email" />
      <textarea name="additionalNotes"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <form name="contact-message" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact-message" />
      <input type="text" name="name" />
      <input type="text" name="phone" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
