# =============================================================================
# Admin 后台 Web（仓库根目录的 React 应用）
# -----------------------------------------------------------------------------
# Netlify 控制台：新建/已有站点 → Build settings
#   Base directory : 留空（使用仓库根目录，勿选子文件夹）
#   Build command  : npm install --legacy-peer-deps && CI=false npm run build
#   Publish dir    : build
#   Functions dir  : netlify/functions（见下方 [build] functions）
# 环境变量（Site settings → Environment variables）示例：
#   REACT_APP_SUPABASE_URL、REACT_APP_SUPABASE_ANON_KEY
#   REACT_APP_GOOGLE_MAPS_API_KEY
#   以及 netlify/functions 内 send-sms / send-email-code 等所需密钥
# CLI 部署（在仓库根目录、且已 netlify link 到本 Admin 站点）：npm run deploy:netlify
# 若 netlify 命令总跳到子项目：先 netlify unlink，再在仓库根目录 netlify link 选 Admin 站点
# =============================================================================

[build]
  command = "npm install --legacy-peer-deps && CI=false npm run build"
  publish = "build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NETLIFY_SKIP_PLUGINS = "true"

# SPA重定向配置 - 解决React Router路由问题
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全头部配置 - 解决外部音频加载问题
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https: wss:; media-src 'self' https: data: blob: https://assets.mixkit.co; img-src 'self' data: https: blob:; font-src 'self' https: data:; frame-src 'self' https:; worker-src 'self' blob:;"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 禁用密钥扫描以避免误报
[build.processing]
  skip_processing = false

# 密钥扫描配置
[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# 忽略密钥扫描的文件模式
[build.processing.skip]
  paths = ["*.md", "*.html", "test-*", "diagnose-*"]

# 环境变量
# 注意：敏感信息（如 Supabase 密钥）应在 Netlify Dashboard 中配置
# Dashboard 中的环境变量优先级高于此文件中的配置
# 访问：Site settings → Environment variables

[context.production.environment]
  # Google Maps API Key（如果需要在 netlify.toml 中配置）
  # REACT_APP_GOOGLE_MAPS_API_KEY = "your-key-here"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[context.deploy-preview.environment]
  # REACT_APP_GOOGLE_MAPS_API_KEY = "your-key-here"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[context.branch-deploy.environment]
  # REACT_APP_GOOGLE_MAPS_API_KEY = "your-key-here"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"